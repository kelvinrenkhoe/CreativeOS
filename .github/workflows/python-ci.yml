name: Python CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project and development tools
        run: |
          python -m pip install --upgrade pip