name: Python CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Generate Ruff fixes
        run: |
          ruff check . --fix
          ruff format .
          git diff > ruff-fixes.diff
          test ! -s ruff-fixes.diff

      - name: Upload Ruff fixes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-fixes
          path: ruff-fixes.diff

      - name: Run tests
        run: pytest -q
